defaults:
  - model: qwen2_audio
  - dataset: librispeech
  - rl: grpo
  - experiment: baseline
  - _self_

work_name: speech-mllm-omni-embedding-rl
seed: 42

paths:
  data_dir: "${oc.env:SPEECHRL_DATA_DIR,/tmp/speechrl-data/datasets}"
  ckpt_dir: "${oc.env:SPEECHRL_CKPT_DIR,/tmp/speechrl-data/checkpoints}"
  mlflow_dir: "${oc.env:SPEECHRL_MLFLOW_DIR,/tmp/speechrl-data/mlruns}"

tracking:
  backend: mlflow
  experiment: ${work_name}
