# CREMA-D — two orthogonal verifiable factors on the SAME audio (the disentanglement substrate).
# Emotion = filename code (6 balanced classes); speaker = filename prefix (91 speakers).
# The CSV `classname` column is NOT used as the emotion label (heavily neutral-skewed); CSVs only
# define train/test pool membership. See docs/data.md.
name: crema_d
loader: cremad
root: ${oc.env:SPEECHRL_DATA_DIR,${oc.env:HOME}/speechrl-data}/datasets/crema-d
task: ser
factors: [content, emotion, speaker]   # content = sentence-ID (12), emotion = 6, speaker = 91
conditionings: [baseline, content, emotion, speaker]   # pin (validated) — don't pick up new global conds
sample_rate: 16000
# Seeded balanced split sizes for the proof run (kept small so it runs in minutes on a 5090).
dev_size: 600     # fit the inference-time probe + select the conditioning (from train.csv pool)
test_size: 300    # held-out report split (from test.csv pool)
